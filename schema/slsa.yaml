    in_subset:
    - slsa_build_track
    - slsa_source_track
    - slsa_dependency_track
    from_schema: https://w3id.org/lmodel/slsa
    slot_uri: slsa:annotations
    owner: ResourceDescriptor
    domain_of:
    - ResourceDescriptor
