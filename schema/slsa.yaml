    from_schema: https://w3id.org/lmodel/slsa
    slot_uri: slsa:downloadLocation
    owner: ResourceDescriptor
    domain_of:
    - ResourceDescriptor
    range: string
  mediaType:
    name: mediaType
    definition_uri: https://w3id.org/lmodel/slsa/mediaType
