    in_subset:
    - slsa_build_track
    - slsa_source_track
    - slsa_build_env_track
    from_schema: https://w3id.org/lmodel/slsa
    slot_uri: slsa:predicate
    owner: Statement
    domain_of:
    - Statement
    range: string
  buildDefinition:
    name: buildDefinition
    definition_uri: https://w3id.org/lmodel/slsa/buildDefinition
    description: All inputs to the build, sufficient to initialise and reproduce it.
