name: slsa
description: Supply-chain Levels for Software Artifacts (SLSA) LinkML schema
title: slsa
source: https://slsa.dev/spec/v1.0
see_also:
- https://lmodel.github.io/slsa
- https://slsa.dev/spec/v1.2/
- https://arxiv.org/abs/2409.05014
- https://openssf.org/technical-initiatives/software-supply-chain/
id: https://w3id.org/lmodel/slsa
version: 1.0.0
imports:
- linkml:types
license: Apache-2.0
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  slsa:
    prefix_prefix: slsa
    prefix_reference: https://w3id.org/lmodel/slsa/
default_prefix: slsa
default_range: string
subsets:
  slsa_build_track:
    name: slsa_build_track
    definition_uri: https://w3id.org/lmodel/slsa/SlsaBuildTrack
    description: Slots and classes related to the SLSA Build Track, which measures
      the trustworthiness of the build process and resulting provenance.
    from_schema: https://w3id.org/lmodel/slsa
  slsa_source_track:
    name: slsa_source_track
    definition_uri: https://w3id.org/lmodel/slsa/SlsaSourceTrack
    description: Slots and classes related to the SLSA Source Track, which measures
      the trustworthiness of how source revisions are created and managed.
    from_schema: https://w3id.org/lmodel/slsa
  slsa_dependency_track:
    name: slsa_dependency_track
    definition_uri: https://w3id.org/lmodel/slsa/SlsaDependencyTrack
    description: Slots and classes related to the SLSA Dependency Track, which measures
      a producer's ability to manage risk from third-party dependencies.
    from_schema: https://w3id.org/lmodel/slsa
  slsa_build_env_track:
    name: slsa_build_env_track
    definition_uri: https://w3id.org/lmodel/slsa/SlsaBuildEnvTrack
    description: Slots and classes related to the SLSA Build Environment Track, which
      measures the integrity of the compute environment running builds.
    from_schema: https://w3id.org/lmodel/slsa
  slsa_adoption_study:
    name: slsa_adoption_study
    definition_uri: https://w3id.org/lmodel/slsa/SlsaAdoptionStudy
    description: Slots, classes, and enums derived from empirical analysis of SLSA
      adoption challenges and strategies. Based on thematic analysis of 1,523 SLSA-related
      GitHub issues from 233 repositories (Tamanna et al., 2024, arXiv:2409.05014).
      These elements model challenge themes and mitigation strategies to support structured
      documentation of adoption status alongside attestation payloads.
    from_schema: https://w3id.org/lmodel/slsa
  slsa_ssf:
    name: slsa_ssf
    definition_uri: https://w3id.org/lmodel/slsa/SlsaSsf
    description: "Slots and classes related to the CNCF TAG-Security Secure Software\
      \ Factory (SSF) reference architecture and the OpenSSF Supply Chain Integrity\
      \ Working Group ecosystem. The SSF defines a standard pipeline pattern \u2014\
      \ Version Control, CI Build Service, Artifact Registry, Signing Service, and\
      \ Policy Engine \u2014 that implements SLSA requirements end-to-end. See: https://github.com/cncf/tag-security/tree/main/supply-chain-security/secure-software-factory\
      \ and https://openssf.org/technical-initiatives/software-supply-chain/"
    from_schema: https://w3id.org/lmodel/slsa
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  BuildLevelEnum:
    name: BuildLevelEnum
    definition_uri: https://w3id.org/lmodel/slsa/BuildLevelEnum
    description: SLSA Build Track levels providing increasing supply chain security
      guarantees for the build process. Higher levels require stronger tamper-resistance
      and provenance integrity.
    in_subset:
    - slsa_build_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      SLSA_BUILD_LEVEL_0:
        text: SLSA_BUILD_LEVEL_0
        description: No SLSA requirements. Represents the absence of SLSA guarantees;
          intended for development or test builds.
      SLSA_BUILD_LEVEL_1:
        text: SLSA_BUILD_LEVEL_1
        description: Provenance exists, showing how the package was built. Prevents
          mistakes and aids documentation, but is trivial to bypass.
      SLSA_BUILD_LEVEL_2:
        text: SLSA_BUILD_LEVEL_2
        description: Build runs on a hosted platform that generates and signs provenance,
          deterring tampering after the build.
        notes:
        - 'Implementation challenge (Tamanna et al., 2024, CI.2): Integrating hosted
          signing tools (e.g., Sigstore/cosign) into diverse CI/CD workflows is complex.
          Tool updates can introduce incompatibilities, silent workflow failures,
          and hard-coded values that complicate ongoing maintenance at this level.'
      SLSA_BUILD_LEVEL_3:
        text: SLSA_BUILD_LEVEL_3
        description: Hardened build platform providing strong guarantees against tampering
          during the build; requires exploiting a vulnerability to forge provenance.
        notes:
        - 'Top adoption barrier (Tamanna et al., 2024, CI.1): Over 50% of practitioners
          surveyed by OpenSSF found hermetic build requirements difficult to implement.
          Non-build configurations (e.g., GoReleaser publish-only steps) lack explicit
          tool support. Use the hermeticBuild slot to record whether the isolation
          requirement is satisfied for a given BuildDefinition.'
  SourceLevelEnum:
    name: SourceLevelEnum
    definition_uri: https://w3id.org/lmodel/slsa/SourceLevelEnum
    description: SLSA Source Track levels providing increasing trust in source code
      provenance and the controls used to create source revisions.
    in_subset:
    - slsa_source_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      SLSA_SOURCE_LEVEL_1:
        text: SLSA_SOURCE_LEVEL_1
        description: Source is stored in a version control system, enabling discrete
          and immutable source revisions for precise consumption.
      SLSA_SOURCE_LEVEL_2:
        text: SLSA_SOURCE_LEVEL_2
        description: Branch history is preserved and immutable; the SCS generates
          tamper- resistant source provenance attestations for each new revision.
      SLSA_SOURCE_LEVEL_3:
        text: SLSA_SOURCE_LEVEL_3
        description: The SCS enforces the organization's technical controls on protected
          Named References, providing verifiable evidence of those controls.
      SLSA_SOURCE_LEVEL_4:
        text: SLSA_SOURCE_LEVEL_4
        description: All changes to protected branches require two-party review by
          trusted persons, resisting insider threats and unilateral changes.
        notes:
        - 'Feasibility concern (Tamanna et al., 2024, LF.2): Many open-source projects
          have only one active maintainer, making the two-party review requirement
          impractical. Whether pair programming and mob programming qualify as equivalent
          review forms is an open question in the practitioner community. Use the
          reviewType slot on SourceRevision to record the form of review applied.'
  DependencyLevelEnum:
    name: DependencyLevelEnum
    definition_uri: https://w3id.org/lmodel/slsa/DependencyLevelEnum
    description: SLSA Dependency Track levels for measuring and controlling risk introduced
      from third-party dependencies.
    in_subset:
    - slsa_dependency_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      SLSA_DEPENDENCY_LEVEL_0:
        text: SLSA_DEPENDENCY_LEVEL_0
        description: No mitigations to dependency threats.
      SLSA_DEPENDENCY_LEVEL_1:
        text: SLSA_DEPENDENCY_LEVEL_1
        description: An inventory of all build dependencies (direct and transitive)
          exists.
      SLSA_DEPENDENCY_LEVEL_2:
        text: SLSA_DEPENDENCY_LEVEL_2
        description: All known vulnerabilities in the artifact's dependencies have
          been triaged before each release.
      SLSA_DEPENDENCY_LEVEL_3:
        text: SLSA_DEPENDENCY_LEVEL_3
        description: All third-party build dependencies are consumed exclusively from
          locations under the producer's control.
      SLSA_DEPENDENCY_LEVEL_4:
        text: SLSA_DEPENDENCY_LEVEL_4
        description: Proactive defense against upstream attacks; an ingestion policy
          prevents consumption of compromised dependencies.
  BuildEnvLevelEnum:
    name: BuildEnvLevelEnum
    definition_uri: https://w3id.org/lmodel/slsa/BuildEnvLevelEnum
    description: SLSA Build Environment Track levels for validating the integrity
      of the compute environment executing builds.
    in_subset:
    - slsa_build_env_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      SLSA_BUILD_ENV_LEVEL_0:
        text: SLSA_BUILD_ENV_LEVEL_0
        description: No build environment integrity requirements.
      SLSA_BUILD_ENV_LEVEL_1:
        text: SLSA_BUILD_ENV_LEVEL_1
        description: Signed build image provenance exists, protecting against tampering
          during build image distribution to the build platform.
      SLSA_BUILD_ENV_LEVEL_2:
        text: SLSA_BUILD_ENV_LEVEL_2
        description: The compute platform attests to the boot-time integrity of the
          build environment, providing evidence of correct instantiation.
      SLSA_BUILD_ENV_LEVEL_3:
        text: SLSA_BUILD_ENV_LEVEL_3
        description: The build environment runs in a hardware-attested trusted execution
          environment (TEE), providing runtime integrity guarantees.
  VerificationResultEnum:
    name: VerificationResultEnum
    definition_uri: https://w3id.org/lmodel/slsa/VerificationResultEnum
    description: Outcome of a policy verification check on an artifact.
    in_subset:
    - slsa_build_track
    - slsa_source_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      PASSED:
        text: PASSED
        description: The artifact satisfied all policy requirements.
      FAILED:
        text: FAILED
        description: The artifact did not satisfy one or more policy requirements.
  SlsaResultEnum:
    name: SlsaResultEnum
    definition_uri: https://w3id.org/lmodel/slsa/SlsaResultEnum
    description: A named SLSA result used in Verification Summary Attestations to
      indicate the verified level of an artifact or its dependencies.
    in_subset:
    - slsa_build_track
    - slsa_source_track
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      SLSA_BUILD_LEVEL_0:
        text: SLSA_BUILD_LEVEL_0
        description: No SLSA Build guarantees verified.
      SLSA_BUILD_LEVEL_1:
        text: SLSA_BUILD_LEVEL_1
        description: Build Level 1 verified for the artifact.
      SLSA_BUILD_LEVEL_2:
        text: SLSA_BUILD_LEVEL_2
        description: Build Level 2 verified for the artifact.
      SLSA_BUILD_LEVEL_3:
        text: SLSA_BUILD_LEVEL_3
        description: Build Level 3 verified for the artifact.
      SLSA_SOURCE_LEVEL_1:
        text: SLSA_SOURCE_LEVEL_1
        description: Source Level 1 verified for the artifact.
      SLSA_SOURCE_LEVEL_2:
        text: SLSA_SOURCE_LEVEL_2
        description: Source Level 2 verified for the artifact.
      SLSA_SOURCE_LEVEL_3:
        text: SLSA_SOURCE_LEVEL_3
        description: Source Level 3 verified for the artifact.
      SLSA_SOURCE_LEVEL_4:
        text: SLSA_SOURCE_LEVEL_4
        description: Source Level 4 verified for the artifact.
  ReviewTypeEnum:
    name: ReviewTypeEnum
    definition_uri: https://w3id.org/lmodel/slsa/ReviewTypeEnum
    description: Categories of code-review process applied to a source revision. Captures
      the forms of two-party review discussed by practitioners (Tamanna et al., 2024,
      LF.2), including contested alternatives whose security equivalence with standard
      asynchronous two-party review has not been formally established.
    in_subset:
    - slsa_source_track
    - slsa_adoption_study
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      TWO_PARTY:
        text: TWO_PARTY
        description: 'Standard two-party review: a change is approved by at least
          one reviewer who is distinct from the author, where both the author and
          reviewer are trusted persons as defined by the organization.'
      PAIR_PROGRAMMING:
        text: PAIR_PROGRAMMING
        description: Two developers working simultaneously on the same code at the
          same workstation or via screen-sharing. Whether this satisfies the trusted-persons
          two-party review requirement is an open question raised in practitioner
          discussions (Tamanna et al., 2024, LF.2).
      MOB_PROGRAMMING:
        text: MOB_PROGRAMMING
        description: Collaborative development with a whole group at once. As with
          pair programming, formal equivalence to asynchronous two-party review has
          not been established for SLSA purposes (Tamanna et al., 2024, LF.2).
      AUTOMATED:
        text: AUTOMATED
        description: Review performed entirely by an automated tool or bot, without
          a second human reviewer. Does not satisfy the SLSA trusted-persons requirement
          for Source Level 4.
  AdoptionChallengeEnum:
    name: AdoptionChallengeEnum
    definition_uri: https://w3id.org/lmodel/slsa/AdoptionChallengeEnum
    description: The four empirically identified themes of challenges practitioners
      encounter when deploying SLSA, derived from thematic analysis of 1,523 SLSA-related
      GitHub issues across 233 repositories (Tamanna et al., 2024, arXiv:2409.05014).
      Challenge counts in parentheses reflect total issues associated with each theme.
    in_subset:
    - slsa_adoption_study
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      COMPLEX_IMPLEMENTATION:
        text: COMPLEX_IMPLEMENTATION
        description: "(CI \u2014 901 issues) Challenges integrating SLSA into projects:\
          \ complicated provenance generation including blocking pre-submit jobs,\
          \ lack of non-build configuration support, and sensitive-data handling risks\
          \ (CI.1); and intricate ongoing maintenance of required tools including\
          \ incompatibilities, silent failures, and documentation drift (CI.2)."
      UNCLEAR_COMMUNICATION:
        text: UNCLEAR_COMMUNICATION
        description: "(UC \u2014 357 issues) Challenges understanding SLSA documentation:\
          \ unclear definitions of key terms such as \"provenance\", \"attestation\"\
          , \"hermetic\", \"hosted\", and \"non-falsifiable\" (UC.1); and lack of\
          \ clear, ecosystem-specific guidance on how to apply SLSA requirements in\
          \ practice (UC.2)."
      LIMITED_FEASIBILITY:
        text: LIMITED_FEASIBILITY
        description: "(LF \u2014 219 issues) Challenges with practical feasibility\
          \ of SLSA requirements: complexity and lack of standardization in attestation\
          \ verification tooling, no standardized storage model for attestations,\
          \ and security concerns about verification accuracy (LF.1); and difficulty\
          \ implementing two-party review for single-maintainer open-source projects\
          \ (LF.2)."
      UNCLEAR_RELEVANCE:
        text: UNCLEAR_RELEVANCE
        description: "(UR \u2014 46 issues) Challenges understanding SLSA's relevance\
          \ and distinct value: confusion about which attacks SLSA mitigates, how\
          \ it differs from OpenSSF best practices, and ecosystem-level policy inconsistencies\
          \ (e.g., npm package naming divergence) that undermine attestation accuracy\
          \ (UR.1)."
  AdoptionStrategyEnum:
    name: AdoptionStrategyEnum
    definition_uri: https://w3id.org/lmodel/slsa/AdoptionStrategyEnum
    description: "The five empirically identified themes of strategies practitioners\
      \ suggested to overcome SLSA adoption challenges, derived from thematic analysis\
      \ of 1,523 SLSA-related GitHub issues (Tamanna et al., 2024, arXiv:2409.05014).\
      \ Each strategy theme contains 2\u20134 sub-strategies (13 total)."
    in_subset:
    - slsa_adoption_study
    from_schema: https://w3id.org/lmodel/slsa
    permissible_values:
      ENHANCE_ALIGNMENT_FLEXIBILITY:
        text: ENHANCE_ALIGNMENT_FLEXIBILITY
        description: '(S1) Enhance SLSA alignment and flexibility: incorporate build-system
          tracks for more tailored approaches (S1.1); gamify adoption levels so producers
          aim for higher levels (S1.2); ensure flexibility for diverse organizational
          and ecosystem needs (S1.3); align SLSA with OpenSSF best practices including
          SECURITY.md and silver/gold criteria (S1.4).'
      PROVIDE_DETAILED_DOCUMENTATION:
        text: PROVIDE_DETAILED_DOCUMENTATION
        description: '(S2) Provide specific and detailed documentation: enhance docs
          with clear definitions, standard terms, revised requirements, and patches
          (S2.1); use negative examples to explain complex concepts and improve website
          diagrams and navigation (S2.2).'
      STREAMLINE_PROVENANCE_GENERATION:
        text: STREAMLINE_PROVENANCE_GENERATION
        description: '(S3) Streamline provenance generation processes: simplify and
          standardize the generation process via tools and templates to reduce confusion
          and improve consistency (S3.1); fix semantic-release tool inconsistencies
          with clear versioning rules and parallel pre-submit job execution (S3.2).'
      IMPROVE_VERIFICATION_PROCESS:
        text: IMPROVE_VERIFICATION_PROCESS
        description: '(S4) Improve the SLSA verification process: strengthen verification
          with better security guarantees and level-determination algorithms (S4.1);
          implement versioning tagging early to facilitate progress tracking (S4.2);
          enhance framework tooling with more downstream signaling information (S4.3).'
      COLLABORATE_WITH_COMMUNITY:
        text: COLLABORATE_WITH_COMMUNITY
        description: '(S5) Collaborate with the community: foster engagement by aligning
          SLSA verification with industry standards and providing guidance for novice
          users (S5.1); promote learning and knowledge-sharing, including cross-project
          collaboration for single-maintainer projects (S5.2).'
slots:
  sha256:
    name: sha256
