---
id: https://w3id.org/lmodel/slsa
name: slsa
title: slsa
description: >-
  Electronic (LinkML) Version of Supply-chain Levels for Software Artifacts (SLSA)
version: 1.0.0
source: https://slsa.dev/spec/v1.0
license: Apache-2.0
see_also:
  - https://lmodel.github.io/slsa
  - https://slsa.dev/spec/v1.2/
  - https://arxiv.org/abs/2409.05014
  - https://openssf.org/technical-initiatives/software-supply-chain/

default_prefix: slsa
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  slsa: https://w3id.org/lmodel/slsa/

imports:
  - linkml:types

subsets:
  slsa_build_track:
    description: >-
      Slots and classes related to the SLSA Build Track, which measures
      the trustworthiness of the build process and resulting provenance.
  slsa_source_track:
    description: >-
      Slots and classes related to the SLSA Source Track, which measures the
      trustworthiness of how source revisions are created and managed.
  slsa_dependency_track:
    description: >-
      Slots and classes related to the SLSA Dependency Track, which measures
      a producer's ability to manage risk from third-party dependencies.
  slsa_build_env_track:
    description: >-
      Slots and classes related to the SLSA Build Environment Track, which
      measures the integrity of the compute environment running builds.

  slsa_adoption_study:
    description: >-
      Slots, classes, and enums derived from empirical analysis of SLSA
      adoption challenges and strategies. Based on thematic analysis of
      1,523 SLSA-related GitHub issues from 233 repositories (Tamanna et al.,
      2024, arXiv:2409.05014). These elements model challenge themes and
      mitigation strategies to support structured documentation of adoption
      status alongside attestation payloads.

  slsa_ssf:
    description: >-
      Slots and classes related to the CNCF TAG-Security Secure Software
      Factory (SSF) reference architecture and the OpenSSF Supply Chain
      Integrity Working Group ecosystem. The SSF defines a standard pipeline
      pattern — Version Control, CI Build Service, Artifact Registry, Signing
      Service, and Policy Engine — that implements SLSA requirements end-to-end.
      See: https://github.com/cncf/tag-security/tree/main/supply-chain-security/secure-software-factory
      and https://openssf.org/technical-initiatives/software-supply-chain/

slots:
  # ── DigestSet slots ───────────────────────────────────────────────────────

  sha256:
    description: Lowercase hex-encoded SHA-256 digest of the artifact.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  sha512:
    description: Lowercase hex-encoded SHA-512 digest of the artifact.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  gitCommit:
    description: Git commit SHA identifying a source-backed artifact.
    in_subset:
      - slsa_source_track
      - slsa_build_track

  # ── ResourceDescriptor slots ──────────────────────────────────────────────

  uri:
    description: >-
      A URI uniquely identifying a resource, such as a package URL (purl),
      git repository URL, or OCI image reference.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track
      - slsa_build_env_track

  digest:
    description: >-
      Set of cryptographic digests of a resource's content used for integrity
      verification.
    range: DigestSet
    inlined: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track
      - slsa_build_env_track

  name:
    description: >-
      A local name for a resource within the context of an attestation, or the
      name of a package, producer, or party.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track

  downloadLocation:
    description: >-
      URI from which a resource can be downloaded, if different from its
      identifying URI.
    in_subset:
      - slsa_build_track
      - slsa_dependency_track

  mediaType:
    description: >-
      IANA media type of a resource's content (e.g.,
      "application/octet-stream", "application/vnd.oci.image.manifest.v1+json").
    in_subset:
      - slsa_build_track
      - slsa_build_env_track

  annotations:
    description: Arbitrary vendor-specific key-value annotations.
    multivalued: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track

  # ── Statement (in-toto) slots ─────────────────────────────────────────────

  _type:
    alias: type
    description: >-
      Always "https://in-toto.io/Statement/v1". Identifies the in-toto
      statement schema version and namespace.
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track

  subject:
    description: >-
      The set of software artifacts to which a predicate applies.
      Each entry MUST contain a digest.
    range: ResourceDescriptor
    multivalued: true
    required: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track

  predicateType:
    description: >-
      URI identifying the schema and semantics of the predicate field.
      Used to distinguish different attestation types (e.g., SLSA
      Provenance vs. Verification Summary Attestation).
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track

  predicate:
    description: >-
      The attestation payload — an arbitrary JSON object whose schema is
      fully determined by predicateType.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track

  # ── BuildProvenance slots ─────────────────────────────────────────────────

  buildDefinition:
    description: >-
      All inputs to the build, sufficient to initialise and reproduce it.
      REQUIRED at SLSA Build L1.
    range: BuildDefinition
    required: true
    inlined: true
    in_subset:
      - slsa_build_track

  runDetails:
    description: >-
      Details specific to this particular execution of the build, including
      builder identity and metadata. REQUIRED at SLSA Build L1.
    range: RunDetails
    required: true
    inlined: true
    in_subset:
      - slsa_build_track

  # ── BuildDefinition slots ─────────────────────────────────────────────────

  buildType:
    description: >-
      URI identifying the template for how to perform the build and how to
      interpret the parameters and dependencies. SHOULD resolve to a
      human-readable specification. REQUIRED at SLSA Build L1.
    required: true
    in_subset:
      - slsa_build_track

  externalParameters:
    description: >-
      Top-level, independent inputs under external (tenant or user) control.
      MUST be complete at SLSA Build L3. Stored as a JSON object.
      Verifiers SHOULD reject unrecognized fields.
    notes:
      - >-
        SSF pipeline definition files (CNCF TAG-Security Secure Software
        Factory): In Tekton-based SSF pipelines, externalParameters typically
        contains the PipelineRun YAML reference or TaskRun definition URI. For
        GitHub Actions, it would contain the workflow file path and ref. These
        values MUST be complete and verifiable at SLSA Build L3 so that
        consumers can confirm the exact build recipe. Use pipelineOrchestrator
        to record the CI system and provenanceGenerationTool (in BuildDefinition)
        to record the attestation generator (e.g., Tekton Chains).
    in_subset:
      - slsa_build_track

  internalParameters:
    description: >-
      Parameters set internally by the build platform. Intended for debugging,
      incident response, and enabling reproducible builds. Stored as a JSON
      object; need not be verified by consumers.
    in_subset:
      - slsa_build_track

  resolvedDependencies:
    description: >-
      Unordered collection of artifacts needed at build time (config files,
      source, build tools). Completeness is best effort through SLSA Build L3.
    range: ResourceDescriptor
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_build_track

  # ── RunDetails slots ──────────────────────────────────────────────────────

  builder:
    description: >-
      Identifies the build platform that executed the build and is trusted to
      have correctly generated this provenance. REQUIRED at SLSA Build L1.
    range: Builder
    required: true
    inlined: true
    in_subset:
      - slsa_build_track

  buildMetadata:
    description: Metadata about this particular build execution.
    range: BuildMetadata
    inlined: true
    in_subset:
      - slsa_build_track

  byproducts:
    description: >-
      Additional artifacts produced during the build that are NOT the primary
      output but may be useful for debugging or incident response (e.g.,
      build logs, intermediate artifacts).
    range: ResourceDescriptor
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_build_track

  # ── Builder / Verifier shared slots ──────────────────────────────────────

  id:
    description: >-
      A URI uniquely identifying an entity (build platform, verifier, build
      image, or source repository). The primary trust anchor for consumers.
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track
      - slsa_build_env_track

  version:
    description: >-
      Map of component names to their version strings, represented as a JSON
      object (string → string).
    in_subset:
      - slsa_build_track

  builderDependencies:
    description: >-
      Dependencies used by the control plane orchestrator that are not run
      within the build workload but may affect provenance generation or
      security guarantees.
    range: ResourceDescriptor
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_build_track

  # ── BuildMetadata slots ───────────────────────────────────────────────────

  invocationId:
    description: >-
      A globally unique identifier for a build invocation, useful for finding
      associated logs. Format defined by builder.id; treated as opaque and
      case-sensitive. The value SHOULD be globally unique.
    in_subset:
      - slsa_build_track

  startedOn:
    description: Timestamp (RFC 3339) of when the build started.
    in_subset:
      - slsa_build_track

  finishedOn:
    description: Timestamp (RFC 3339) of when the build completed.
    in_subset:
      - slsa_build_track

  # ── VerificationSummaryAttestation slots ──────────────────────────────────

  verifier:
    description: Identifies the entity that performed the verification.
    range: Verifier
    required: true
    inlined: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  timeVerified:
    description: Timestamp (RFC 3339) indicating when the verification occurred.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  resourceUri:
    description: >-
      URI identifying the resource associated with the artifact being verified.
      SHOULD be the URI from which the consumer fetches the artifact.
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  policy:
    description: >-
      The policy the subject was verified against. MUST contain a URI;
      SHOULD contain a digest identifying the exact policy version.
    notes:
      - >-
        SSF Policy Engine layer (CNCF TAG-Security): In the SSF reference
        architecture, the policy consumed here is enforced at admission time
        by a Policy Engine such as OPA/Gatekeeper or Kyverno. These engines
        consume Verification Summary Attestations (VSAs) to verify that an
        artifact meets the required SLSA level before allowing deployment.
        Best practice is to reference a versioned, content-addressed policy
        document so verifiers can reconstruct the exact policy evaluated.
    range: ResourceDescriptor
    required: true
    inlined: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  inputAttestations:
    description: >-
      All attestations consulted during verification. If non-empty, MUST be
      complete — it MUST list every attestation used. Each entry MUST contain
      a digest; SHOULD contain a URI.
    range: ResourceDescriptor
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  verificationResult:
    description: Whether the artifact passed or failed policy verification.
    range: VerificationResultEnum
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  verifiedLevels:
    description: >-
      The highest verified SLSA level for each applicable track (not including
      transitive dependencies). At most one level per track. Implies all
      levels below it within the same track.
    range: SlsaResultEnum
    multivalued: true
    required: true
    in_subset:
      - slsa_build_track
      - slsa_source_track

  dependencyLevels:
    description: >-
      Map from SlsaResult to count of transitive dependencies verified at
      that level (JSON object string). Allows policy engines to enforce
      minimum levels on the full dependency graph.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  slsaVersion:
    description: >-
      Version of the SLSA specification used during verification, in
      MAJOR.MINOR format (e.g., "1.0").
    in_subset:
      - slsa_build_track
      - slsa_source_track

  # ── Producer slots ────────────────────────────────────────────────────────

  buildPlatformId:
    description: URI of the build platform chosen to produce artifacts.
    in_subset:
      - slsa_build_track

  # ── BuildPlatform slots ───────────────────────────────────────────────────

  buildLevel:
    description: >-
      The SLSA Build Level this platform is capable of producing, as
      determined by its provenance generation and isolation guarantees.
    range: BuildLevelEnum
    in_subset:
      - slsa_build_track

  isHosted:
    description: >-
      True if this is a hosted (multi-tenant) platform running on shared or
      dedicated infrastructure, rather than an individual's workstation.
      Required for SLSA Build L2+.
    notes:
      - >-
        SSF reference architecture (CNCF TAG-Security): Hosted, multi-tenant
        build services (GitHub Actions, Google Cloud Build, GitLab CI/CD,
        CircleCI) are the recommended Build Service layer in the SSF pattern.
        Using a hosted service is a prerequisite for SLSA Build L2 because it
        provides the separation of concerns that prevents tenants from tampering
        with provenance generated by the control plane. Self-hosted runners
        can be used at SLSA Build L2+ only if they replicate the isolation
        guarantees of hosted services.
    range: boolean
    in_subset:
      - slsa_build_track

  # ── Package slots ─────────────────────────────────────────────────────────

  ecosystem:
    description: >-
      The package ecosystem (e.g., "PyPA", "npm", "OCI", "cargo") governing
      distribution conventions for this package.
    notes:
      - >-
        Ecosystem naming inconsistency can undermine attestation accuracy
        (Tamanna et al., 2024, UR.1): For example, "npm install P" produces
        package name A while "npm download P && npm install P.tar.gz" produces
        name B from the same source, causing metadata and provenance mismatches
        that persist even with lock files. Policy engines must account for these
        cross-registry naming discrepancies when verifying provenance.
    in_subset:
      - slsa_build_track
      - slsa_dependency_track

  registry:
    description: >-
      URI of the package registry where a package is published and from which
      consumers resolve the package name to an artifact.
    in_subset:
      - slsa_build_track
      - slsa_dependency_track

  artifact:
    description: >-
      A specific immutable package artifact or the artifact whose dependency
      inventory is recorded.
    range: ResourceDescriptor
    inlined: true
    in_subset:
      - slsa_build_track
      - slsa_dependency_track

  # ── SourceRepository slots ────────────────────────────────────────────────

  description:
    description: Human-readable description of a repository's purpose or a resource.
    in_subset:
      - slsa_source_track

  sourceLevel:
    description: >-
      The SLSA Source Level achieved or verified for a source repository or
      revision.
    range: SourceLevelEnum
    in_subset:
      - slsa_source_track

  # ── SourceRevision slots ──────────────────────────────────────────────────

  revisionId:
    description: >-
      Immutable identifier for a source revision (e.g., git commit SHA,
      path-qualified sequential number).
    required: true
    in_subset:
      - slsa_source_track

  repository:
    description: The source repository that contains this revision.
    range: SourceRepository
    inlined: true
    in_subset:
      - slsa_source_track

  author:
    description: >-
      Identity of the person or automation that authored this revision
      (e.g., an email address or platform username).
    in_subset:
      - slsa_source_track

  timestamp:
    description: Timestamp (RFC 3339) of when this source revision was created.
    in_subset:
      - slsa_source_track

  parentRevisions:
    description: >-
      Revision IDs of the parent revision(s), forming the directed acyclic
      graph of change history.
    multivalued: true
    in_subset:
      - slsa_source_track

  # ── SourceProvenanceAttestation slots ─────────────────────────────────────

  revision:
    description: The source revision that this attestation describes.
    range: SourceRevision
    inlined: true
    in_subset:
      - slsa_source_track

  controlsEnforced:
    description: >-
      Technical controls actively enforced by the Source Control System when
      this revision was created (e.g., "two-party review", "branch
      protection", "status checks").
    multivalued: true
    notes:
      - >-
        Two-party review feasibility (Tamanna et al., 2024, LF.2): Many
        open-source projects have a single maintainer, making the two-party
        review requirement impractical. Pair programming and mob programming
        were raised as contested alternatives whose security equivalence has
        not been formally established. Use the reviewType slot on SourceRevision
        to record the specific form of review applied.
    in_subset:
      - slsa_source_track

  # ── DependencyInventory slots ─────────────────────────────────────────────

  dependencies:
    description: >-
      All third-party build dependencies (direct and transitive) for an
      artifact version, identified by URI and digest.
    range: ResourceDescriptor
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - slsa_dependency_track

  dependencyLevel:
    description: >-
      The SLSA Dependency Level that this inventory and associated triage
      process supports.
    range: DependencyLevelEnum
    in_subset:
      - slsa_dependency_track

  # ── BuildImage / BuildEnvironmentAttestation slots ────────────────────────

  provenance:
    description: >-
      SLSA Build Provenance for a build image, describing how the image itself
      was produced. Required for SLSA Build Environment L1+.
    range: BuildProvenance
    inlined: true
    in_subset:
      - slsa_build_env_track

  buildEnvLevel:
    description: >-
      The SLSA Build Environment Level supported or represented, reflecting
      the strength of the integrity guarantees provided.
    range: BuildEnvLevelEnum
    in_subset:
      - slsa_build_env_track

  buildId:
    description: >-
      An immutable identifier uniquely assigned to a build execution (e.g.,
      a UUID). Links a BuildEnvironmentAttestation to the corresponding build
      provenance.
    required: true
    in_subset:
      - slsa_build_env_track

  buildImage:
    description: >-
      The build image from which the build environment was instantiated.
    range: BuildImage
    inlined: true
    in_subset:
      - slsa_build_env_track

  measurements:
    description: >-
      Cryptographic measurements (hashes) of build environment components
      captured during boot and initialization, used to verify integrity
      against known-good reference values.
    multivalued: true
    in_subset:
      - slsa_build_env_track

  # ── Adoption Study slots (Tamanna et al., 2024, arXiv:2409.05014) ─────────

  hermeticBuild:
    description: >-
      Whether all build inputs are fully isolated to the dependencies declared
      in resolvedDependencies, with no network access or filesystem references
      outside the explicit build graph. Hermetic builds are a stated requirement
      for SLSA Build L3; practitioners identified this as one of the most
      commonly cited implementation barriers, with over 50% of surveyed
      practitioners finding hermetic build requirements difficult to implement
      (Tamanna et al., 2024, CI.1).
    range: boolean
    in_subset:
      - slsa_build_track
      - slsa_adoption_study

  provenanceGenerationTool:
    description: >-
      URI or name of the tool used to generate provenance for this build
      (e.g., "https://github.com/slsa-framework/slsa-github-generator").
      Standardizing this field across builds reduces confusion, supports
      reproducibility verification, and aligns with the recommended strategy
      of simplifying and standardizing provenance generation processes
      (Tamanna et al., 2024, S3.1).
    in_subset:
      - slsa_build_track
      - slsa_adoption_study

  attestationStorageUri:
    description: >-
      URI indicating where this signed attestation is publicly stored or
      retrievable. No universal standard for attestation storage location was
      established in SLSA v1.0; Sigstore and VCS-embedded storage are two
      common approaches. Explicitly recording this URI addresses the storage
      ambiguity identified as a significant adoption barrier: practitioners
      reported uncertainty about where generated attestations should be stored
      (Tamanna et al., 2024, LF.1).
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track
      - slsa_adoption_study

  reviewType:
    description: >-
      The type of human or automated review process used to approve this
      source revision. Captures the contested forms of two-party review —
      including pair programming and mob programming — whose security
      equivalence to standard asynchronous two-party review is an open
      question identified in practitioner community discussions
      (Tamanna et al., 2024, LF.2). See ReviewTypeEnum for defined values.
    range: ReviewTypeEnum
    in_subset:
      - slsa_source_track
      - slsa_adoption_study

  versionTag:
    description: >-
      A semantic version tag (e.g., "v1.2.3") assigned to the builder or
      the produced artifact at the time of the build. Practitioners recommended
      implementing versioning tagging early in SLSA framework deployment to
      facilitate progress tracking, reduce maintenance confusion from breaking
      changes, and enable more straightforward verification (Tamanna et al.,
      2024, S4.2).
    in_subset:
      - slsa_build_track
      - slsa_adoption_study

  challenges:
    description: >-
      The adoption challenge themes that apply to this attestation or
      deployment context, drawn from the empirically identified challenge
      taxonomy (Tamanna et al., 2024, arXiv:2409.05014).
    range: AdoptionChallengeEnum
    multivalued: true
    in_subset:
      - slsa_adoption_study

  strategies:
    description: >-
      The mitigation strategies being employed or recommended in this
      attestation or deployment context, drawn from the empirically identified
      strategy taxonomy (Tamanna et al., 2024, arXiv:2409.05014).
    range: AdoptionStrategyEnum
    multivalued: true
    in_subset:
      - slsa_adoption_study

  adoptionMetadata:
    description: >-
      Optional structured metadata recording the SLSA adoption challenges
      and mitigation strategies relevant to this attestation context.
      Derived from empirical analysis of SLSA-related GitHub issues
      (Tamanna et al., 2024, arXiv:2409.05014). Intended for use by
      framework authors, practitioners, and tooling that tracks adoption
      progress alongside attestation payloads.
    range: AdoptionMetadata
    inlined: true
    in_subset:
      - slsa_adoption_study

  # ── SSF / OpenSSF ecosystem slots (CNCF TAG-Security, OpenSSF WG) ─────────

  pipelineOrchestrator:
    description: >-
      URI or name of the CI/CD pipeline orchestration system that coordinated
      this build (e.g., "https://tekton.dev",
      "https://github.com/features/actions", "https://jenkins.io"). In the
      SSF reference architecture this is the Build Service layer that feeds
      the Artifact Registry. Providing this field helps distinguish the
      orchestrator from the provenance-generating builder identity (builder.id)
      in complex deployments where they differ (e.g., a Tekton Pipeline
      running on Google Cloud Pipelines).
    in_subset:
      - slsa_build_track
      - slsa_ssf

  signingTool:
    description: >-
      URI or name of the tool used to cryptographically sign the artifact or
      attestation (e.g., "https://github.com/sigstore/cosign",
      "https://github.com/notaryproject/notation"). In the SSF reference
      architecture the Signing Service layer is distinct from the Build
      Service; recording the signing tool enables verifiers to select the
      matching verification workflow. For Sigstore keyless signing the value
      should be the Cosign release URI.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_ssf

  sigstoreLogEntry:
    description: >-
      URI of the Rekor transparency log entry recording this attestation or
      artifact signature (e.g.,
      "https://rekor.sigstore.dev/api/v1/log/entries/24296fb..."). The Rekor
      log provides an immutable, auditable record of signing events that
      underpins Sigstore keyless signing. Verifiers can fetch this entry to
      confirm the cryptographic signature was recorded in the public-good log
      and obtain the signing certificate chain issued by Fulcio. Recording
      this URI enables offline and third-party verification without requiring
      direct access to the original signing key.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_ssf

  guacUri:
    description: >-
      URI to query the GUAC (Graph for Understanding Artifact Composition)
      instance for dependency and provenance graph data related to this
      artifact (e.g.,
      "https://guac.example.com/api/v0/artifact/sha256:..."). GUAC is an
      OpenSSF project that ingests SLSA provenance, SBOMs, and vulnerability
      data to produce a queryable supply chain graph. Providing this URI
      enables consumers to retrieve the full transitive dependency graph and
      associated risk signals without reprocessing all upstream attestations.
    in_subset:
      - slsa_build_track
      - slsa_dependency_track
      - slsa_ssf

  securityInsightsUri:
    description: >-
      URI to the SECURITY-INSIGHTS.yml file for the project that produced
      this artifact (e.g.,
      "https://raw.githubusercontent.com/example/myapp/main/
      SECURITY-INSIGHTS.yml"). Security Insights is an OpenSSF project that
      defines a machine-processable format for projects to self-report their
      security practices, vulnerability disclosure policy, and tool usage.
      Together with SLSA provenance it forms a complementary view: provenance
      describes a specific artifact's build; Security Insights describes the
      project's ongoing security posture.
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_ssf

enums:
  BuildLevelEnum:
    description: >-
      SLSA Build Track levels providing increasing supply chain security
      guarantees for the build process. Higher levels require stronger
      tamper-resistance and provenance integrity.
    in_subset:
      - slsa_build_track
    permissible_values:
      SLSA_BUILD_LEVEL_0:
        description: >-
          No SLSA requirements. Represents the absence of SLSA guarantees;
          intended for development or test builds.
      SLSA_BUILD_LEVEL_1:
        description: >-
          Provenance exists, showing how the package was built. Prevents
          mistakes and aids documentation, but is trivial to bypass.
      SLSA_BUILD_LEVEL_2:
        description: >-
          Build runs on a hosted platform that generates and signs provenance,
          deterring tampering after the build.
        notes:
          - >-
            Implementation challenge (Tamanna et al., 2024, CI.2): Integrating
            hosted signing tools (e.g., Sigstore/cosign) into diverse CI/CD
            workflows is complex. Tool updates can introduce incompatibilities,
            silent workflow failures, and hard-coded values that complicate
            ongoing maintenance at this level.
      SLSA_BUILD_LEVEL_3:
        description: >-
          Hardened build platform providing strong guarantees against tampering
          during the build; requires exploiting a vulnerability to forge
          provenance.
        notes:
          - >-
            Top adoption barrier (Tamanna et al., 2024, CI.1): Over 50% of
            practitioners surveyed by OpenSSF found hermetic build requirements
            difficult to implement. Non-build configurations (e.g., GoReleaser
            publish-only steps) lack explicit tool support. Use the
            hermeticBuild slot to record whether the isolation requirement is
            satisfied for a given BuildDefinition.

  SourceLevelEnum:
    description: >-
      SLSA Source Track levels providing increasing trust in source code
      provenance and the controls used to create source revisions.
    in_subset:
      - slsa_source_track
    permissible_values:
      SLSA_SOURCE_LEVEL_1:
        description: >-
          Source is stored in a version control system, enabling discrete and
          immutable source revisions for precise consumption.
      SLSA_SOURCE_LEVEL_2:
        description: >-
          Branch history is preserved and immutable; the SCS generates tamper-
          resistant source provenance attestations for each new revision.
      SLSA_SOURCE_LEVEL_3:
        description: >-
          The SCS enforces the organization's technical controls on protected
          Named References, providing verifiable evidence of those controls.
      SLSA_SOURCE_LEVEL_4:
        description: >-
          All changes to protected branches require two-party review by trusted
          persons, resisting insider threats and unilateral changes.
        notes:
          - >-
            Feasibility concern (Tamanna et al., 2024, LF.2): Many open-source
            projects have only one active maintainer, making the two-party
            review requirement impractical. Whether pair programming and mob
            programming qualify as equivalent review forms is an open question
            in the practitioner community. Use the reviewType slot on
            SourceRevision to record the form of review applied.

  DependencyLevelEnum:
    description: >-
      SLSA Dependency Track levels for measuring and controlling risk
      introduced from third-party dependencies.
    in_subset:
      - slsa_dependency_track
    permissible_values:
      SLSA_DEPENDENCY_LEVEL_0:
        description: No mitigations to dependency threats.
      SLSA_DEPENDENCY_LEVEL_1:
        description: An inventory of all build dependencies (direct and transitive) exists.
      SLSA_DEPENDENCY_LEVEL_2:
        description: >-
          All known vulnerabilities in the artifact's dependencies have been
          triaged before each release.
      SLSA_DEPENDENCY_LEVEL_3:
        description: >-
          All third-party build dependencies are consumed exclusively from
          locations under the producer's control.
      SLSA_DEPENDENCY_LEVEL_4:
        description: >-
          Proactive defense against upstream attacks; an ingestion policy
          prevents consumption of compromised dependencies.

  BuildEnvLevelEnum:
    description: >-
      SLSA Build Environment Track levels for validating the integrity of
      the compute environment executing builds.
    in_subset:
      - slsa_build_env_track
    permissible_values:
      SLSA_BUILD_ENV_LEVEL_0:
        description: No build environment integrity requirements.
      SLSA_BUILD_ENV_LEVEL_1:
        description: >-
          Signed build image provenance exists, protecting against tampering
          during build image distribution to the build platform.
      SLSA_BUILD_ENV_LEVEL_2:
        description: >-
          The compute platform attests to the boot-time integrity of the build
          environment, providing evidence of correct instantiation.
      SLSA_BUILD_ENV_LEVEL_3:
        description: >-
          The build environment runs in a hardware-attested trusted execution
          environment (TEE), providing runtime integrity guarantees.

  VerificationResultEnum:
    description: Outcome of a policy verification check on an artifact.
    in_subset:
      - slsa_build_track
      - slsa_source_track
    permissible_values:
      PASSED:
        description: The artifact satisfied all policy requirements.
      FAILED:
        description: The artifact did not satisfy one or more policy requirements.

  SlsaResultEnum:
    description: >-
      A named SLSA result used in Verification Summary Attestations to
      indicate the verified level of an artifact or its dependencies.
    in_subset:
      - slsa_build_track
      - slsa_source_track
    permissible_values:
      SLSA_BUILD_LEVEL_0:
        description: No SLSA Build guarantees verified.
      SLSA_BUILD_LEVEL_1:
        description: Build Level 1 verified for the artifact.
      SLSA_BUILD_LEVEL_2:
        description: Build Level 2 verified for the artifact.
      SLSA_BUILD_LEVEL_3:
        description: Build Level 3 verified for the artifact.
      SLSA_SOURCE_LEVEL_1:
        description: Source Level 1 verified for the artifact.
      SLSA_SOURCE_LEVEL_2:
        description: Source Level 2 verified for the artifact.
      SLSA_SOURCE_LEVEL_3:
        description: Source Level 3 verified for the artifact.
      SLSA_SOURCE_LEVEL_4:
        description: Source Level 4 verified for the artifact.

  # ── Adoption Study enums (Tamanna et al., 2024, arXiv:2409.05014) ─────────

  ReviewTypeEnum:
    description: >-
      Categories of code-review process applied to a source revision. Captures
      the forms of two-party review discussed by practitioners (Tamanna et al.,
      2024, LF.2), including contested alternatives whose security equivalence
      with standard asynchronous two-party review has not been formally
      established.
    in_subset:
      - slsa_source_track
      - slsa_adoption_study
    permissible_values:
      TWO_PARTY:
        description: >-
          Standard two-party review: a change is approved by at least one
          reviewer who is distinct from the author, where both the author and
          reviewer are trusted persons as defined by the organization.
      PAIR_PROGRAMMING:
        description: >-
          Two developers working simultaneously on the same code at the same
          workstation or via screen-sharing. Whether this satisfies the
          trusted-persons two-party review requirement is an open question
          raised in practitioner discussions (Tamanna et al., 2024, LF.2).
      MOB_PROGRAMMING:
        description: >-
          Collaborative development with a whole group at once. As with pair
          programming, formal equivalence to asynchronous two-party review
          has not been established for SLSA purposes (Tamanna et al., 2024,
          LF.2).
      AUTOMATED:
        description: >-
          Review performed entirely by an automated tool or bot, without a
          second human reviewer. Does not satisfy the SLSA trusted-persons
          requirement for Source Level 4.

  AdoptionChallengeEnum:
    description: >-
      The four empirically identified themes of challenges practitioners
      encounter when deploying SLSA, derived from thematic analysis of 1,523
      SLSA-related GitHub issues across 233 repositories (Tamanna et al., 2024,
      arXiv:2409.05014). Challenge counts in parentheses reflect total issues
      associated with each theme.
    in_subset:
      - slsa_adoption_study
    permissible_values:
      COMPLEX_IMPLEMENTATION:
        description: >-
          (CI — 901 issues) Challenges integrating SLSA into projects:
          complicated provenance generation including blocking pre-submit jobs,
          lack of non-build configuration support, and sensitive-data handling
          risks (CI.1); and intricate ongoing maintenance of required tools
          including incompatibilities, silent failures, and documentation drift
          (CI.2).
      UNCLEAR_COMMUNICATION:
        description: >-
          (UC — 357 issues) Challenges understanding SLSA documentation:
          unclear definitions of key terms such as "provenance", "attestation",
          "hermetic", "hosted", and "non-falsifiable" (UC.1); and lack of
          clear, ecosystem-specific guidance on how to apply SLSA requirements
          in practice (UC.2).
      LIMITED_FEASIBILITY:
        description: >-
          (LF — 219 issues) Challenges with practical feasibility of SLSA
          requirements: complexity and lack of standardization in attestation
          verification tooling, no standardized storage model for attestations,
          and security concerns about verification accuracy (LF.1); and
          difficulty implementing two-party review for single-maintainer
          open-source projects (LF.2).
      UNCLEAR_RELEVANCE:
        description: >-
          (UR — 46 issues) Challenges understanding SLSA's relevance and
          distinct value: confusion about which attacks SLSA mitigates, how it
          differs from OpenSSF best practices, and ecosystem-level policy
          inconsistencies (e.g., npm package naming divergence) that undermine
          attestation accuracy (UR.1).

  AdoptionStrategyEnum:
    description: >-
      The five empirically identified themes of strategies practitioners
      suggested to overcome SLSA adoption challenges, derived from thematic
      analysis of 1,523 SLSA-related GitHub issues (Tamanna et al., 2024,
      arXiv:2409.05014). Each strategy theme contains 2–4 sub-strategies
      (13 total).
    in_subset:
      - slsa_adoption_study
    permissible_values:
      ENHANCE_ALIGNMENT_FLEXIBILITY:
        description: >-
          (S1) Enhance SLSA alignment and flexibility: incorporate build-system
          tracks for more tailored approaches (S1.1); gamify adoption levels so
          producers aim for higher levels (S1.2); ensure flexibility for diverse
          organizational and ecosystem needs (S1.3); align SLSA with OpenSSF
          best practices including SECURITY.md and silver/gold criteria (S1.4).
      PROVIDE_DETAILED_DOCUMENTATION:
        description: >-
          (S2) Provide specific and detailed documentation: enhance docs with
          clear definitions, standard terms, revised requirements, and patches
          (S2.1); use negative examples to explain complex concepts and improve
          website diagrams and navigation (S2.2).
      STREAMLINE_PROVENANCE_GENERATION:
        description: >-
          (S3) Streamline provenance generation processes: simplify and
          standardize the generation process via tools and templates to reduce
          confusion and improve consistency (S3.1); fix semantic-release tool
          inconsistencies with clear versioning rules and parallel pre-submit
          job execution (S3.2).
      IMPROVE_VERIFICATION_PROCESS:
        description: >-
          (S4) Improve the SLSA verification process: strengthen verification
          with better security guarantees and level-determination algorithms
          (S4.1); implement versioning tagging early to facilitate progress
          tracking (S4.2); enhance framework tooling with more downstream
          signaling information (S4.3).
      COLLABORATE_WITH_COMMUNITY:
        description: >-
          (S5) Collaborate with the community: foster engagement by aligning
          SLSA verification with industry standards and providing guidance for
          novice users (S5.1); promote learning and knowledge-sharing, including
          cross-project collaboration for single-maintainer projects (S5.2).

classes:
  # ── Root document ─────────────────────────────────────────────────────────

  SlsaDocument:
    description: >-
      Root wrapper for any SLSA attestation payload. Acts as the entry point
      for schema validation and tools.
    tree_root: true
    class_uri: linkml:Any
    slots:
      - buildDefinition
      - runDetails
      - verifier
      - verificationResult
      - verifiedLevels
      - adoptionMetadata
    in_subset:
      - slsa_build_track

  # ── Core artifact and digest primitives ──────────────────────────────────

  DigestSet:
    description: >-
      A set of cryptographic digests for an artifact, keyed by algorithm name
      (e.g., "sha256", "gitCommit"). Provides enough information for consumers
      to verify artifact integrity using their preferred algorithm.
    class_uri: linkml:Any
    slots:
      - sha256
      - sha512
      - gitCommit
    in_subset:
      - slsa_build_track
      - slsa_source_track

  ResourceDescriptor:
    description: >-
      A reference to a software artifact including its location, digest, and
      optional metadata. Used throughout SLSA to describe inputs, outputs,
      and dependencies in provenance attestations.
    class_uri: linkml:Any
    slots:
      - uri
      - digest
      - name
      - downloadLocation
      - mediaType
      - annotations
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_dependency_track
      - slsa_build_env_track

  # ── Attestation model (in-toto) ───────────────────────────────────────────

  Statement:
    description: >-
      The middle layer of an in-toto software attestation (Statement v1).
      Binds an authenticated predicate to one or more subject artifacts,
      allowing predicate-agnostic processing and storage.
    notes:
      - >-
        Terminology clarity (Tamanna et al., 2024, UC.1): Practitioners report
        widespread confusion between "attestation" and "provenance". An
        attestation is this signed Statement wrapper; provenance is the specific
        BuildProvenance predicate payload. Documenting this distinction
        addresses the most frequently cited terminology barrier.
      - >-
        Attestation storage gap (Tamanna et al., 2024, LF.1): No standardized
        location for publishing signed attestations was defined in SLSA v1.0.
        Sigstore and VCS-embedded storage are two common approaches. Use the
        attestationStorageUri slot to record where this statement is stored.
    abstract: true
    class_uri: linkml:Any
    slots:
      - _type
      - subject
      - predicateType
      - predicate
      - attestationStorageUri
    in_subset:
      - slsa_build_track
      - slsa_source_track
      - slsa_build_env_track

  # ── Build Track: Provenance ───────────────────────────────────────────────

  BuildProvenance:
    description: >-
      An attestation predicate (predicateType "https://slsa.dev/provenance/v1")
      that describes how a set of output artifacts was produced by a build
      platform. Consumers use this to verify artifact authenticity and trace
      artifacts back through the supply chain.
    notes:
      - >-
        Top adoption challenge (Tamanna et al., 2024, CI.1 — 901 issues):
        Generating valid provenance is the highest-volume challenge theme in
        practitioner GitHub issues. Key sub-challenges include the blocking
        nature of check-verifier pre-submit jobs, lack of support for
        non-build configurations (e.g., GoReleaser publish-only steps),
        laborious multi-build script setup, and risk of leaking credentials
        or other sensitive data in externalParameters.
    is_a: Statement
    slots:
      - buildDefinition
      - runDetails
    in_subset:
      - slsa_build_track

  BuildDefinition:
    description: >-
      Describes all inputs to the build in enough detail to initialise and
      reproduce the build. The accuracy and completeness are implied by the
      builder identified in runDetails.
    notes:
      - >-
        Hermetic build challenge (Tamanna et al., 2024, CI.1): Over 50% of
        practitioners surveyed by OpenSSF found hermetic builds difficult to
        implement. Non-build configurations (e.g., GoReleaser publish-only
        steps) lack explicit hermetic-build tool support. Use hermeticBuild
        to record whether L3 isolation is satisfied.
      - >-
        Provenance generation standardization (Tamanna et al., 2024, S3.1):
        Recording which tool generated this provenance via
        provenanceGenerationTool supports standardization, reproducibility
        verification, and incident response.
    class_uri: linkml:Any
    slots:
      - buildType
      - externalParameters
      - internalParameters
      - resolvedDependencies
      - hermeticBuild
      - provenanceGenerationTool
    in_subset:
      - slsa_build_track

  RunDetails:
    description: >-
      Details specific to this particular execution of the build, including
      the trusted builder and optional run-level metadata.
    class_uri: linkml:Any
    slots:
      - builder
      - buildMetadata
      - byproducts
    in_subset:
      - slsa_build_track

  Builder:
    description: >-
      Represents the transitive closure of all software, hardware, and
      entities trusted to faithfully execute the build and record provenance.
      The builder.id is the primary basis for determining SLSA Build Level.
    class_uri: linkml:Any
    slots:
      - id
      - builderDependencies
      - version
      - versionTag
    in_subset:
      - slsa_build_track

  BuildMetadata:
    description: >-
      Metadata about a specific invocation of the build, including timing
      information and a unique build identifier for log correlation.
    class_uri: linkml:Any
    slots:
      - invocationId
      - startedOn
      - finishedOn
    in_subset:
      - slsa_build_track

  # ── Verification Summary Attestation ─────────────────────────────────────

  VerificationSummaryAttestation:
    description: >-
      An attestation predicate (predicateType
      "https://slsa.dev/verification_summary/v1") issued by a trusted
      verifier stating that one or more artifacts were evaluated against a
      policy and the SLSA level at which they were verified. Allows
      consumers to trust the verifier's determination without needing
      access to all underlying provenance.
    notes:
      - >-
        Verification complexity (Tamanna et al., 2024, LF.1): The
        slsa-verifier tool was highlighted by practitioners for complexity
        and redundancy. No standardized attestation storage model existed
        as of SLSA v1.0; inconsistencies between package manager registries
        and stored files can undermine verification accuracy. Downstream
        systems also lack clear guidance on how to consume and communicate
        attestation data to other stakeholders.
    see_also:
      - https://openssf.org/projects/guac/
    is_a: Statement
    slots:
      - verifier
      - timeVerified
      - resourceUri
      - policy
      - inputAttestations
      - verificationResult
      - verifiedLevels
      - dependencyLevels
      - slsaVersion
    in_subset:
      - slsa_build_track
      - slsa_source_track

  Verifier:
    description: >-
      The entity that performed verification of an artifact and issued a
      Verification Summary Attestation. Consumers MUST accept only specific
      (signer, verifier) pairs.
    class_uri: linkml:Any
    slots:
      - id
      - version
    in_subset:
      - slsa_build_track
      - slsa_source_track

  # ── Roles ─────────────────────────────────────────────────────────────────

  Producer:
    description: >-
      A party who creates software and provides it to others. Responsible for
      choosing an appropriate build platform, following a consistent build
      process, and distributing provenance to consumers.
    slots:
      - name
      - buildPlatformId
    in_subset:
      - slsa_build_track

  Consumer:
    description: >-
      A party who uses software provided by a producer. May verify provenance
      directly or delegate that responsibility to a separate verifier.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  InfrastructureProvider:
    description: >-
      A party who provides software or services to other roles in the supply
      chain, such as a package registry maintainer or build platform operator.
    in_subset:
      - slsa_build_track
      - slsa_source_track

  # ── Build Platform ────────────────────────────────────────────────────────

  BuildPlatform:
    description: >-
      The infrastructure (software, hardware, people, and organizations) used
      to transform source code into package artifacts. Responsible for
      provenance generation and isolation between tenant builds. Often a
      hosted, multi-tenant build service.
    slots:
      - id
      - buildLevel
      - isHosted
    in_subset:
      - slsa_build_track

  ControlPlane:
    description: >-
      The build platform component that orchestrates each independent build
      execution and generates provenance. Managed by an admin and trusted to
      be outside of tenant control. Responsible for generating and signing
      provenance at SLSA Build L2+.
    in_subset:
      - slsa_build_track

  # ── Package model ─────────────────────────────────────────────────────────

  Package:
    description: >-
      An identifiable unit of software intended for distribution. In the SLSA
      model, a package is always the output of a build process (which may be
      a no-op). The package name is the primary security boundary within a
      package ecosystem.
    slots:
      - name
      - ecosystem
      - registry
      - artifact
    in_subset:
      - slsa_build_track
      - slsa_dependency_track

  # ── Source Track ──────────────────────────────────────────────────────────

  SourceRepository:
    description: >-
      A self-contained unit that holds the content and complete revision
      history for a set of files, along with metadata such as branches and
      tags. Hosted and governed by a Source Control System.
    slots:
      - id
      - description
      - sourceLevel
    slot_usage:
      id:
        description: Canonical URI that uniquely identifies this source repository.
    in_subset:
      - slsa_source_track

  SourceRevision:
    description: >-
      A specific, logically immutable snapshot of a source repository's
      tracked files. Uniquely identified by a revision identifier such as
      a cryptographic hash (e.g., git commit SHA) or a path-qualified
      sequential number (e.g., SVN).
    class_uri: linkml:Any
    slots:
      - revisionId
      - repository
      - author
      - timestamp
      - parentRevisions
      - reviewType
    notes:
      - >-
        if SourceRevision ever needs signingTool/sigstoreLogEntry (for 
        Sigstore-signed git tags via Cosign, gittuf), then consider adding 
        a SigstoreSignable mixin on both Statement and SourceRevision
    in_subset:
      - slsa_source_track

  SourceProvenanceAttestation:
    description: >-
      An attestation describing how a source revision came to exist: where it
      was hosted, when it was generated, what process was used, who the
      contributors were, and which technical controls were enforced by the
      Source Control System.
    is_a: Statement
    slots:
      - revision
      - sourceLevel
      - controlsEnforced
    in_subset:
      - slsa_source_track

  # ── Dependency Track ──────────────────────────────────────────────────────

  DependencyInventory:
    description: >-
      A comprehensive inventory of all third-party build dependencies for
      an artifact, capturing direct and transitive dependencies. Supports
      vulnerability management and incident response.
    class_uri: linkml:Any
    slots:
      - artifact
      - dependencies
      - dependencyLevel
    in_subset:
      - slsa_dependency_track

  # ── Build Environment Track ───────────────────────────────────────────────

  BuildImage:
    description: >-
      The template for a build environment, such as a VM or container image.
      Comprises the root filesystem, pre-installed guest OS and packages, the
      build executor, and the build agent. Created by a build image producer
      and consumed by the hosted build platform.
    slots:
      - id
      - provenance
      - buildEnvLevel
    slot_usage:
      id:
        description: >-
          URI uniquely identifying this build image version (e.g., an OCI
          image reference with digest).
    in_subset:
      - slsa_build_env_track

  BuildEnvironmentAttestation:
    description: >-
      An attestation describing the integrity of a build environment at the
      time a specific build was dispatched and executed. Used to verify that
      a build ran in the expected, untampered environment.
    is_a: Statement
    slots:
      - buildId
      - buildImage
      - measurements
      - buildEnvLevel
    in_subset:
      - slsa_build_env_track

  # ── Adoption Study class (Tamanna et al., 2024, arXiv:2409.05014) ─────────

  AdoptionMetadata:
    description: >-
      Optional structured metadata capturing the SLSA adoption challenges
      and mitigation strategies relevant to a given attestation or deployment
      context. Derived from empirical analysis of 1,523 SLSA-related GitHub
      issues across 233 repositories (Tamanna et al., 2024, arXiv:2409.05014).
      Use this class to document which challenge themes apply to the current
      deployment and which strategies are being employed or recommended.
      Attach via the adoptionMetadata slot on SlsaDocument.
    class_uri: linkml:Any
    slots:
      - challenges
      - strategies
    in_subset:
      - slsa_adoption_study
